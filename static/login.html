<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登入 — 投資人報告草稿產生器</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg, #f5f5f5);
      }
      .login-box {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      }
      .login-box h1 {
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
        color: #111;
      }
      .login-box p {
        font-size: 0.85rem;
        color: #666;
        margin: 0 0 1.5rem;
      }
      .login-box label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 0.4rem;
      }
      .login-box input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.15s;
      }
      .login-box input[type="password"]:focus {
        border-color: #555;
      }
      .login-box button {
        margin-top: 1rem;
        width: 100%;
        padding: 0.65rem;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .login-box button:hover { background: #333; }
      .login-box button:disabled { background: #999; cursor: not-allowed; }
      #loginError {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: #c0392b;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h1>投資人報告草稿產生器</h1>
      <p>內部作業工具，請輸入密碼繼續。</p>
      <label for="password">密碼</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="輸入密碼" />
      <button type="button" id="loginBtn">登入</button>
      <div id="loginError"></div>
    </div>
    <script>
      const input = document.getElementById('password');
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');

      async function doLogin() {
        err.textContent = '';
        btn.disabled = true;
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: input.value }),
          });
          const data = await res.json();
          if (res.ok && data.ok) {
            window.location.href = '/';
          } else {
            err.textContent = data.error || '登入失敗，請重試。';
            input.select();
          }
        } catch {
          err.textContent = '網路錯誤，請重試。';
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener('click', doLogin);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
      input.focus();
    </script>
  </body>
</html>
